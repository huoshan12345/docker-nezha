name: Build
on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: nezha
  DOCKERHUB_USERNAME: huoshan12345
  VERSION: 2.0.7

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: nezhahq/nezha

      - name: Download and extract
        run: |
          mkdir -p dist
          curl -L -o dashboard.zip \
            "https://github.com/nezhahq/nezha/releases/download/v${VERSION}/dashboard-linux-amd64.zip"
          unzip -o dashboard.zip -d dist
          chmod +x dist/dashboard-*

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}
